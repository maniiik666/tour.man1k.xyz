<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 — MAN1K Wild Heart Tour 2026</title>
    <meta name="description" content="Сторінка не знайдена — MAN1K Wild Heart Tour 2026">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="https://man1k.xyz/favicon.ico" type="image/x-icon">
    <link rel="icon" href="https://man1k.xyz/icons/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="https://man1k.xyz/icons/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Unbounded:wght@200;400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --off: #b0b0b0;
            --dim: #555;
            --dimmer: #2a2a2a;
            --red: #a80000;
            --border: rgba(255, 255, 255, .12);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
        }

        body {
            background: var(--black);
            color: var(--off);
            font-family: 'Unbounded', sans-serif;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ——— Page curtain ——— */
        .page-curtain {
            position: fixed;
            inset: 0;
            z-index: 100000;
            background: var(--black);
            pointer-events: none;
            transition: opacity 1s cubic-bezier(.4, 0, .2, 1);
        }

        .page-curtain.lifted {
            opacity: 0;
        }

        /* ——— Page glitch ——— */
        .page-glitch {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9997;
            opacity: 0;
            mix-blend-mode: screen;
        }

        .page-glitch.flash {
            animation: pageGlitchFlash .15s steps(1) 1;
        }

        @keyframes pageGlitchFlash {
            0% {
                opacity: 1;
                clip-path: inset(20% 0 60% 0);
                transform: translateX(-6px);
            }

            20% {
                opacity: .8;
                clip-path: inset(70% 0 5% 0);
                transform: translateX(8px);
            }

            40% {
                opacity: .6;
                clip-path: inset(5% 0 75% 0);
                transform: translateX(-4px);
            }

            70% {
                opacity: .4;
                clip-path: inset(50% 0 30% 0);
                transform: translateX(3px);
            }

            100% {
                opacity: 0;
                clip-path: none;
                transform: translateX(0);
            }
        }

        /* ——— Grain ——— */
        .grain,
        .grain2 {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        .grain {
            opacity: .05;
            animation: grain .2s steps(1) infinite;
        }

        .grain2 {
            opacity: .10;
            animation: grain .35s steps(1) infinite reverse;
            background-size: 128px 128px;
        }

        @keyframes grain {
            0% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-3%, -4%);
            }

            20% {
                transform: translate(4%, 2%);
            }

            30% {
                transform: translate(-2%, 5%);
            }

            40% {
                transform: translate(5%, -3%);
            }

            50% {
                transform: translate(-4%, 3%);
            }

            60% {
                transform: translate(3%, -5%);
            }

            70% {
                transform: translate(-5%, 2%);
            }

            80% {
                transform: translate(2%, 4%);
            }

            90% {
                transform: translate(-3%, -2%);
            }
        }

        /* ——— Scanlines ——— */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .18) 2px, rgba(0, 0, 0, .18) 4px);
        }

        /* ——— Custom cursor ——— */
        .cursor-dot {
            width: 6px;
            height: 6px;
            background: var(--white);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99997;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        .cursor-ring {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(255, 255, 255, .5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99996;
            transform: translate(-50%, -50%);
            transition: width .2s, height .2s, border-color .2s;
        }

        body.cursor-hover .cursor-ring {
            width: 48px;
            height: 48px;
            border-color: var(--white);
        }

        /* ——— Topbar ——— */
        .topbar {
            border-bottom: 1px solid rgba(255, 255, 255, .35);
            padding: 14px clamp(16px, 5vw, 72px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1000;
            flex-shrink: 0;
        }

        .topbar-text {
            font-weight: 400;
            font-size: clamp(6px, 1.1vw, 9px);
            letter-spacing: .4em;
            text-transform: uppercase;
            color: var(--dim);
        }

        .topbar-back {
            font-weight: 700;
            font-size: clamp(7px, 1.1vw, 9px);
            letter-spacing: .35em;
            color: var(--white);
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid var(--white);
            padding: 6px 14px;
            transition: background .2s, color .2s;
            white-space: nowrap;
        }

        .topbar-back:hover {
            background: var(--white);
            color: var(--black);
        }

        /* ——— Main 404 area ——— */
        .void-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(20px, 5vw, 60px) clamp(16px, 5vw, 72px);
            position: relative;
            overflow: hidden;
        }

        /* Background cross watermark */
        .void-wrap::before {
            content: '✝';
            position: absolute;
            font-size: clamp(260px, 70vw, 900px);
            color: rgba(255, 255, 255, .018);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            line-height: 1;
            animation: crosspulse 9s ease-in-out infinite;
        }

        @keyframes crosspulse {

            0%,
            100% {
                opacity: .018;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: .05;
                transform: translate(-50%, -50%) scale(1.06);
            }
        }

        /* ——— 404 number ——— */
        .error-code {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(140px, 32vw, 380px);
            line-height: .88;
            color: var(--white);
            letter-spacing: .04em;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation:
                fade-up .7s ease forwards .2s,
                numflicker 12s steps(1) infinite 3s;
            user-select: none;
        }

        @keyframes numflicker {

            0%,
            89%,
            92%,
            95%,
            100% {
                opacity: 1;
                transform: none;
            }

            90% {
                opacity: .06;
                transform: translateX(-8px) skewX(-3deg);
            }

            91% {
                opacity: .7;
                transform: translateX(6px);
            }

            93% {
                opacity: .12;
                transform: translateX(-4px) skewX(2deg);
            }

            94% {
                opacity: .9;
                transform: translateX(3px);
            }

            96% {
                opacity: .3;
                transform: translateX(-2px);
            }

            97% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Red glitch shadow layers */
        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            font-family: 'Bebas Neue', cursive;
            font-size: inherit;
            letter-spacing: .04em;
            pointer-events: none;
        }

        .error-code::before {
            color: rgba(168, 0, 0, .55);
            animation: glitch-r 12s steps(1) infinite 3s;
            clip-path: inset(0);
        }

        .error-code::after {
            color: rgba(0, 200, 255, .2);
            animation: glitch-b 12s steps(1) infinite 3.08s;
            clip-path: inset(0);
        }

        @keyframes glitch-r {

            0%,
            89%,
            97%,
            100% {
                opacity: 0;
                transform: none;
                clip-path: inset(0);
            }

            90% {
                opacity: 1;
                transform: translateX(-6px);
                clip-path: inset(15% 0 55% 0);
            }

            91% {
                opacity: 1;
                transform: translateX(4px);
                clip-path: inset(65% 0 5% 0);
            }

            92% {
                opacity: 0;
            }

            93% {
                opacity: 1;
                transform: translateX(-3px);
                clip-path: inset(40% 0 35% 0);
            }

            94% {
                opacity: 0;
            }

            95% {
                opacity: 1;
                transform: translateX(5px);
                clip-path: inset(5% 0 70% 0);
            }

            96% {
                opacity: 0;
            }
        }

        @keyframes glitch-b {

            0%,
            89%,
            97%,
            100% {
                opacity: 0;
                transform: none;
                clip-path: inset(0);
            }

            90% {
                opacity: 1;
                transform: translateX(8px);
                clip-path: inset(50% 0 20% 0);
            }

            91% {
                opacity: 1;
                transform: translateX(-5px);
                clip-path: inset(10% 0 60% 0);
            }

            92% {
                opacity: 0;
            }

            93% {
                opacity: 1;
                transform: translateX(3px);
                clip-path: inset(75% 0 0 0);
            }

            94% {
                opacity: 0;
            }
        }

        /* ——— Ritual label ——— */
        .error-ritual {
            margin-top: clamp(8px, 2vw, 20px);
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(8px, 1.5vw, 12px);
            letter-spacing: .55em;
            color: var(--dimmer);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fade-up .8s ease forwards .5s;
            animation: fade-in .9s ease forwards .6s;
        }

        /* ——— Main tagline ——— */
        .error-title {
            margin-top: clamp(20px, 4vw, 44px);
            font-weight: 900;
            font-size: clamp(18px, 4.5vw, 56px);
            line-height: 1.05;
            letter-spacing: -.02em;
            text-transform: uppercase;
            color: var(--white);
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fade-up .9s ease forwards .7s;
        }

        /* ——— Sub line ——— */
        .error-sub {
            margin-top: clamp(10px, 2vw, 20px);
            font-weight: 200;
            font-size: clamp(9px, 1.3vw, 12px);
            letter-spacing: .22em;
            color: var(--dim);
            line-height: 1.8;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fade-up .9s ease forwards .9s;
            max-width: 520px;
        }

        .error-sub em {
            font-style: normal;
            font-family: 'Share Tech Mono', monospace;
            font-size: .9em;
            color: var(--dimmer);
            letter-spacing: .15em;
        }

        /* ——— CTA buttons ——— */
        .error-cta {
            margin-top: clamp(24px, 4.5vw, 52px);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fade-up .9s ease forwards 1.1s;
        }

        .btn-primary {
            display: inline-block;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: clamp(9px, 1.4vw, 12px);
            letter-spacing: .35em;
            text-transform: uppercase;
            color: var(--black);
            background: var(--white);
            padding: clamp(12px, 1.8vw, 16px) clamp(28px, 4.5vw, 52px);
            text-decoration: none;
            transition: background .35s ease, color .35s ease, letter-spacing .3s ease, box-shadow .35s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-primary:hover,
        .btn-primary:active {
            background: var(--red);
            color: var(--white);
            letter-spacing: .45em;
            box-shadow: 0 0 35px rgba(168, 0, 0, .35), 0 0 70px rgba(168, 0, 0, .15);
        }

        .btn-ghost {
            display: inline-block;
            font-family: 'Unbounded', sans-serif;
            font-weight: 400;
            font-size: clamp(8px, 1.2vw, 11px);
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--dim);
            background: none;
            border: 1px solid rgba(255, 255, 255, .18);
            padding: clamp(11px, 1.7vw, 15px) clamp(22px, 3.5vw, 40px);
            text-decoration: none;
            transition: color .3s ease, border-color .3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-ghost:hover {
            color: var(--white);
            border-color: rgba(255, 255, 255, .5);
        }

        /* ——— Glitch divider ——— */
        .glitch-div {
            width: 100%;
            height: 2px;
            background: var(--white);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .glitch-div::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--black);
            animation: glitch-line 5s ease-in-out infinite;
        }

        @keyframes glitch-line {

            0%,
            84%,
            100% {
                transform: translateX(-100%);
                opacity: 0;
            }

            87% {
                transform: translateX(-45%);
                opacity: 1;
            }

            93% {
                transform: translateX(65%);
                opacity: 1;
            }

            97% {
                transform: translateX(110%);
                opacity: 0;
            }
        }

        /* ——— Footer strip ——— */
        .footer-strip {
            border-top: 1px solid rgba(255, 255, 255, .35);
            padding: 12px clamp(16px, 5vw, 72px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
        }

        .footer-strip a {
            display: block;
            opacity: .45;
            transition: opacity .2s;
        }

        .footer-strip a:hover {
            opacity: .85;
        }

        .footer-strip img {
            height: clamp(12px, 1.8vw, 16px);
            width: auto;
            display: block;
        }

        .footer-strip-links {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .footer-strip-link {
            font-family: 'Share Tech Mono', monospace;
            font-size: 7px;
            letter-spacing: .3em;
            color: rgba(255, 255, 255, .2);
            text-decoration: none;
            text-transform: uppercase;
            transition: color .2s;
        }

        .footer-strip-link:hover {
            color: var(--white);
        }

        .footer-strip-copy {
            font-family: 'Share Tech Mono', monospace;
            font-size: 7px;
            letter-spacing: .2em;
            color: rgba(255, 255, 255, .1);
        }

        /* ——— Animations ——— */
        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ——— Mobile ——— */
        @media(max-width:600px) {
            body {
                overflow: auto;
            }

            .topbar {
                padding: 10px 14px;
            }

            .void-wrap {
                padding: 32px 16px;
            }

            .error-code {
                font-size: clamp(110px, 30vw, 200px);
            }

            .error-title {
                font-size: clamp(16px, 5.5vw, 36px);
            }

            .error-sub {
                font-size: 10px;
                letter-spacing: .15em;
            }

            .footer-strip {
                padding: 10px 14px;
                flex-direction: column;
                text-align: center;
            }

            .footer-strip-links {
                justify-content: center;
            }

            .cursor-dot,
            .cursor-ring {
                display: none !important;
            }
        }

        @media(max-height:480px) and (orientation:landscape) {
            .error-code {
                font-size: clamp(80px, 22vh, 160px);
            }

            .error-title {
                font-size: clamp(14px, 4vh, 28px);
                margin-top: 10px;
            }

            .error-sub {
                margin-top: 8px;
            }

            .error-cta {
                margin-top: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="page-curtain" id="pageCurtain"></div>
    <div class="page-glitch" id="pageGlitch"></div>
    <div class="grain"></div>
    <div class="grain2"></div>
    <div class="scanlines"></div>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <header class="topbar">
        <p class="topbar-text">Wild Heart Tour 2026</p>
        <a href="index.html" class="topbar-back">← Назад</a>
    </header>

    <main class="void-wrap">
        <div class="error-code" aria-label="404">404</div>

        <p class="error-ritual"># &nbsp; Р И Т У А Л &nbsp; Н Е &nbsp; З Н А Й Д Е Н О &nbsp; #</p>

        <div class="error-cta">
            <a href="index.html" class="btn-primary">← Повернутись</a>
            <a href="faq.html" class="btn-ghost">FAQ</a>
        </div>
    </main>

    <script>
        /* ——— Page curtain ——— */
        (function () {
            var c = document.getElementById('pageCurtain');
            var gl = document.getElementById('pageGlitch');
            if (!c) return;
            setTimeout(function () {
                c.classList.add('lifted');
                if (gl) {
                    setTimeout(function () { gl.classList.add('flash'); }, 80);
                    setTimeout(function () { gl.classList.remove('flash'); void gl.offsetWidth; gl.classList.add('flash'); }, 200);
                    setTimeout(function () { gl.classList.remove('flash'); void gl.offsetWidth; gl.classList.add('flash'); }, 360);
                    setTimeout(function () { gl.classList.remove('flash'); void gl.offsetWidth; gl.classList.add('flash'); }, 480);
                    setTimeout(function () { gl.classList.remove('flash'); }, 620);
                }
            }, 200);
            setTimeout(function () { c.style.display = 'none'; }, 1400);
        })();

        /* ——— Page glitch — more aggressive on 404 ——— */
        (function () {
            var gl = document.getElementById('pageGlitch');
            if (!gl) return;
            gl.style.background = 'linear-gradient(0deg,transparent 40%,rgba(255,255,255,.04) 41%,transparent 42%,transparent 58%,rgba(255,255,255,.03) 59%,transparent 60%)';
            function fire() {
                gl.classList.remove('flash');
                void gl.offsetWidth;
                gl.classList.add('flash');
                setTimeout(function () { gl.classList.remove('flash'); }, 180);
                /* double-flash sometimes */
                if (Math.random() > .6) {
                    setTimeout(function () {
                        gl.classList.remove('flash');
                        void gl.offsetWidth;
                        gl.classList.add('flash');
                        setTimeout(function () { gl.classList.remove('flash'); }, 120);
                    }, 280);
                }
                setTimeout(fire, 1500 + Math.random() * 6000);
            }
            setTimeout(fire, 1200 + Math.random() * 2000);
        })();

        /* ——— Custom cursor ——— */
        (function () {
            var dot = document.getElementById('cursorDot');
            var ring = document.getElementById('cursorRing');
            if (!dot || !ring) return;
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                dot.style.display = 'none'; ring.style.display = 'none'; return;
            }
            var mx = 0, my = 0, rx = 0, ry = 0;
            document.addEventListener('mousemove', function (e) {
                mx = e.clientX; my = e.clientY;
                dot.style.left = mx + 'px'; dot.style.top = my + 'px';
            });
            (function animRing() {
                rx += (mx - rx) * .14; ry += (my - ry) * .14;
                ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
                requestAnimationFrame(animRing);
            })();
            document.querySelectorAll('a,button').forEach(function (el) {
                el.addEventListener('mouseenter', function () { document.body.classList.add('cursor-hover'); });
                el.addEventListener('mouseleave', function () { document.body.classList.remove('cursor-hover'); });
            });
        })();
    </script>
</body>

</html>
